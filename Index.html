<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: none; background: #000; } 
        
        /* Start Screen */
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000 url('Jamper.png') no-repeat center;
            background-size: contain; z-index: 500;
        }

        #startBtn {
            display: none; margin-top: 20px; padding: 20px 60px;
            background: #00ff66; color: #000; border: none;
            font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 28px; text-transform: uppercase;
            box-shadow: 0 0 20px #00ff66;
        }

        /* NEW SEPARATE BUTTON PAUSE LAYOUT */
        #pause-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; gap: 40px;
        }

        /* Left Side: Navigation Buttons */
        .menu-sidebar {
            display: flex; flex-direction: column; gap: 15px;
            width: 250px;
        }

        .menu-btn {
            background: #111; border: 2px solid #00ff66; color: #00ff66;
            padding: 15px; font-size: 18px; font-weight: bold;
            text-align: left; cursor: pointer; text-transform: uppercase;
            transition: 0.3s; position: relative; overflow: hidden;
        }

        .menu-btn:hover {
            background: #00ff66; color: #000;
            box-shadow: 0 0 15px #00ff66;
        }

        .menu-btn.active {
            background: #00ff66; color: #000;
        }

        /* Right Side: Content Panels */
        .content-panel {
            width: 450px; height: 350px;
            border: 2px solid #00ff66; background: #000;
            display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,255,102,0.2);
        }

        .panel-header {
            background: #00ff66; color: #000; padding: 10px;
            font-weight: bold; font-size: 14px; letter-spacing: 1px;
        }

        .panel-body {
            padding: 20px; color: #00ff66; flex-grow: 1;
            display: flex; flex-direction: column; gap: 15px;
        }

        #adminInput {
            background: #050505; border: 1px solid #00ff66; color: #00ff66;
            padding: 12px; font-size: 18px; outline: none; width: 100%; box-sizing: border-box;
        }

        /* Easter Egg / Video Styling */
        #video-container {
            position: absolute; width: 100%; height: 100%;
            background: #000; display: none; z-index: 4000;
            justify-content: center; align-items: center;
        }
        #tuffVideo { max-width: 90vw; max-height: 90vh; border: 2px solid #00ff66; }

        #tuff-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ff66; font-size: 24px; font-weight: bold; text-align: center;
            background: #000; padding: 25px; border: 2px solid #00ff66;
            display: none; z-index: 5000;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="percent-text" style="color:#00ffcc; font-size:80px;">0%</div>
        <button id="startBtn">PLAY GAME</button>
    </div>

    <div id="video-container">
        <video id="tuffVideo" src="Jandel.mp4"></video>
    </div>
    
    <div id="tuff-message"></div>
    <div id="easter-egg" style="display:none; position:absolute; width:100%; height:100%; background:#000 url('Jamper.png') no-repeat center; background-size:contain; z-index:3000;"></div>

    <div id="pause-overlay">
        
        <div class="menu-sidebar">
            <div style="color: #00ff66; font-size: 12px; margin-bottom: 10px;">SYSTEM_V.1.0</div>
            <button class="menu-btn" onclick="handleCommand()">Resume Game</button>
            <button class="menu-btn active">Admin Console</button>
            <button class="menu-btn" onclick="location.reload()">Reset Session</button>
            <div style="margin-top: 20px; color: #008844; font-size: 11px;">
                SESSION_SCORE: <span id="session-score-display">0</span>
            </div>
        </div>

        <div class="content-panel">
            <div class="panel-header">COMMAND_TERMINAL_ROOT</div>
            <div class="panel-body">
                <p style="font-size: 13px; margin: 0;">Enter authorization codes or admin cheats below:</p>
                <input type="text" id="adminInput" placeholder="READY FOR INPUT..." autofocus autocomplete="off">
                <div style="font-size: 12px; color: #008844; line-height: 1.5;">
                    > [UP/SPACE] Jump (x2)<br>
                    > [S/W/DOWN] Dove Throw<br>
                    > [ESC] Toggle Menu
                </div>
                <button class="menu-btn" style="text-align: center; margin-top: auto;" onclick="handleCommand()">Execute CMD</button>
            </div>
        </div>

    </div>

    <button id="retryBtn" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px 40px; background:#00ff66; font-weight:bold; cursor:pointer;" onclick="resetGame()">RETRY?</button>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const pauseOverlay = document.getElementById('pause-overlay');
const adminInput = document.getElementById('adminInput');
const sessionScoreDisplay = document.getElementById('session-score-display');

const images = {};
const sources = { player: 'Jamper.png', enemy: 'Lerma.png', dove: 'dove.png', bottle: 'bottle.png', wata: 'wata.png', bg: 'Brixk.png' };
let loadedCount = 0;
const totalImages = Object.keys(sources).length;

for (let key in sources) {
    images[key] = new Image(); images[key].src = sources[key];
    images[key].onload = () => {
        loadedCount++;
        document.getElementById('percent-text').innerText = Math.floor((loadedCount/totalImages)*100) + "%";
        if (loadedCount === totalImages) startBtn.style.display = "block";
    };
}

startBtn.onclick = () => { document.getElementById('loading-screen').style.display = 'none'; canvas.style.display = 'block'; resize(); resetGame(); };
window.addEventListener('resize', resize);
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

let speed = 8, score = 0, gameOver = false, paused = false, tuffJamperUsed = false;
let projectiles = [], playerProjectiles = [];
let player = { x: 0, y: 0, w: 75, h: 75, dy: 0, jumps: 0, recoil: 0 };
let bgScroll = 0, spawnTimer = 0, hitFeedback = 0;

function handleCommand() {
    const val = adminInput.value.trim();
    if (val === '67') {
        adminInput.value = '';
        document.getElementById('easter-egg').style.display = 'block';
        setTimeout(() => { document.getElementById('easter-egg').style.display = 'none'; adminInput.focus(); }, 3000);
    } 
    else if (val === 'TuffJamper') {
        adminInput.value = '';
        if (!tuffJamperUsed) {
            tuffJamperUsed = true;
            pauseOverlay.style.display = 'none';
            document.getElementById('video-container').style.display = 'flex';
            const vid = document.getElementById('tuffVideo');
            vid.play();
            vid.onended = () => {
                document.getElementById('video-container').style.display = 'none';
                pauseOverlay.style.display = 'flex';
                showPopup("YOU GET +1500 FOR BEING TUFF JAMPER", 1500);
            };
        } else { showPopup("bro are we fr", 0); }
    }
    else { startCountdown(); }
}

function showPopup(msg, bonus) {
    const m = document.getElementById('tuff-message');
    m.innerText = msg; m.style.display = 'block';
    score += bonus; sessionScoreDisplay.innerText = score;
    setTimeout(() => { m.style.display = 'none'; adminInput.focus(); }, 2500);
}

function togglePause() {
    if (gameOver || document.getElementById('video-container').style.display === 'flex') return;
    if (!paused) {
        paused = true;
        sessionScoreDisplay.innerText = score;
        pauseOverlay.style.display = 'flex';
        adminInput.focus();
    } else { handleCommand(); }
}

function startCountdown() {
    paused = false; pauseOverlay.style.display = 'none';
    const originalSpeed = speed; speed = 0;
    let count = 3;
    let timer = setInterval(() => {
        count--;
        if (count <= 0) { clearInterval(timer); speed = originalSpeed; update(); }
    }, 1000);
}

adminInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleCommand(); });
window.addEventListener('keydown', e => {
    if (e.code === 'Escape') togglePause();
    if (gameOver || paused || speed === 0 || document.activeElement === adminInput) return;
    if ((e.code === 'Space' || e.code === 'ArrowUp') && player.jumps < 2) { player.dy = -16; player.jumps++; }
    if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'KeyW') { playerProjectiles.push({ x: player.x, y: player.y + 25, vx: -16 }); player.recoil = 10; }
});

function resetGame() {
    score = 0; speed = 8; gameOver = false; paused = false; projectiles = []; playerProjectiles = [];
    player.x = canvas.width - 160; player.y = canvas.height - 180; player.dy = 0; player.jumps = 0;
    document.getElementById('retryBtn').style.display = 'none';
    update();
}

function update() {
    if (gameOver || paused || speed === 0) return;
    const groundY = canvas.height - 100;
    speed += 0.001; player.dy += 0.85; player.y += player.dy;
    if (player.y > groundY - player.h) { player.y = groundY - player.h; player.dy = 0; player.jumps = 0; }
    if (player.recoil > 0) player.recoil--;
    bgScroll -= speed; spawnTimer++;
    if (spawnTimer > (60 / (speed/8)) + Math.random() * 40) { projectiles.push({ x: -50, y: groundY - 55, vx: speed + 4 }); spawnTimer = 0; }
    projectiles.forEach((p, i) => {
        p.x += p.vx;
        if (p.x < player.x + player.w - 20 && p.x + 40 > player.x + 20 && p.y < player.y + player.h && p.y + 40 > player.y) {
            gameOver = true; document.getElementById('retryBtn').style.display = 'block';
        }
    });
    playerProjectiles.forEach((dp, j) => {
        dp.x += dp.vx;
        if (dp.x < 150 && dp.x > 30 && dp.y > groundY - 120) { score += 500; hitFeedback = 10; playerProjectiles.splice(j, 1); }
    });
    if (hitFeedback > 0) hitFeedback--;
    score += Math.floor(speed / 8);
    draw(); requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const bgW = images.bg.width || 100;
    const shiftX = bgScroll % bgW;
    for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) ctx.drawImage(images.bg, x, 0, bgW, canvas.height);
    const groundY = canvas.height - 100;
    if (hitFeedback > 0) ctx.filter = "brightness(3) invert(1)";
    ctx.drawImage(images.enemy, 30, groundY - 130, 130, 130);
    ctx.filter = "none";
    ctx.drawImage(images.bottle, 160, groundY - 70, 50, 50);
    playerProjectiles.forEach(dp => ctx.drawImage(images.dove, dp.x, dp.y, 40, 40));
    projectiles.forEach(p => ctx.drawImage(images.wata, p.x, p.y, 55, 55));
    ctx.drawImage(images.player, player.x + player.recoil, player.y, player.w, player.h);
    if (!paused && speed !== 0) { ctx.font = "bold 28px Courier New"; ctx.fillStyle = "#00ffcc"; ctx.fillText(`SCORE: ${score}`, 20, 40); }
}
</script>
</body>
</html>
