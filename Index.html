<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant🍦🍾</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: none; background: #000; } 
        
        /* Start Screen */
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000 url('Jamper.png') no-repeat center;
            background-size: contain; z-index: 500;
        }

        #percent-text {
            font-size: 80px; font-weight: bold; color: #00ffcc;
            text-shadow: 0 0 20px #000;
        }

        #startBtn {
            display: none; margin-top: 20px; padding: 20px 60px;
            background: #00ff66; color: #000; border: none;
            font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 28px; text-transform: uppercase;
            box-shadow: 0 0 20px #00ff66;
        }

        /* Admin Mod Terminal Overlay */
        #pause-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 15, 0, 0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .terminal-window {
            background: #000; border: 3px solid #00ff66;
            padding: 30px; display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 0 30px #00ff66; text-align: center; width: 350px;
        }

        #adminInput {
            background: #001100; border: 1px solid #00ff66; color: #00ff66;
            padding: 12px; font-size: 18px; outline: none; text-align: center;
        }

        .terminal-btn {
            background: #00ff66; color: #000; border: none;
            font-weight: bold; cursor: pointer; padding: 12px; font-size: 20px;
            transition: 0.2s;
        }
        .terminal-btn:hover { background: #00cc55; }

        /* Secret Code Visuals */
        #easter-egg {
            position: absolute; width: 100%; height: 100%;
            background: #000 url('Jamper.png') no-repeat center;
            background-size: contain; display: none; z-index: 3000;
        }

        #video-container {
            position: absolute; width: 100%; height: 100%;
            background: #000; display: none; z-index: 4000;
            justify-content: center; align-items: center;
        }

        #tuffVideo { 
            max-width: 90vw; 
            max-height: 90vh; 
            border: 2px solid #00ff66; 
            box-shadow: 0 0 20px #00ff66;
        }

        #tuff-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ff66; font-size: 24px; font-weight: bold; text-align: center;
            background: #000; padding: 25px; border: 2px solid #00ff66;
            display: none; z-index: 5000; box-shadow: 0 0 20px #00ff66;
        }

        /* Gameplay UI */
        .controls-hint {
            position: absolute; bottom: 30px; width: 100%; text-align: center;
            color: #00ffcc; font-size: 16px; text-shadow: 2px 2px #000; 
            pointer-events: none; display: none; z-index: 100;
            letter-spacing: 1px;
        }

        .score-board { 
            position: absolute; top: 20px; left: 20px; font-size: 28px; 
            font-weight: bold; color: #00ffcc; display: none; text-shadow: 2px 2px #000; 
        }

        #countdown-text {
            position: absolute; font-size: 120px; color: #00ff66;
            font-weight: bold; display: none; z-index: 2000;
        }

        #retryBtn { 
            display: none; position: absolute; padding: 20px 40px; font-size: 24px; 
            background: #00ff66; color: #000; border: none; cursor: pointer; 
            top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 600; 
            font-weight: bold; box-shadow: 0 0 15px #00ff66;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="percent-text">0%</div>
        <button id="startBtn">PLAY GAME</button>
    </div>

    <div id="video-container">
        <video id="tuffVideo" src="Jandel.mp4"></video>
    </div>
    
    <div id="tuff-message">ERROR: ROOT_MESSAGE_NULL</div>

    <div id="easter-egg"></div>

    <div id="pause-overlay">
        <div class="terminal-window">
            <div style="color:#00ff66; margin-bottom:5px;">ADMIN_MOD_ACTIVE</div>
            <input type="text" id="adminInput" placeholder="CMD_ROOT..." autofocus autocomplete="off">
            <button id="resumeBtn" class="terminal-btn">RESUME_PLAY</button>
        </div>
    </div>

    <div id="countdown-text">3</div>

    <div class="controls-hint" id="controlText">
        [UP/SPACE] DOUBLE JUMP | [DOWN/S/W] THROW DOVE | [ESC] ADMIN MOD
    </div>

    <div class="score-board" id="scoreDisplay">SCORE: 0</div>
    <button id="retryBtn" onclick="resetGame()">RETRY?</button>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const pauseOverlay = document.getElementById('pause-overlay');
const adminInput = document.getElementById('adminInput');
const countdownDisplay = document.getElementById('countdown-text');

const images = {};
const sources = {
    player: 'Jamper.png',
    enemy: 'Lerma.png',
    dove: 'dove.png',
    bottle: 'bottle.png',
    wata: 'wata.png',
    bg: 'Brixk.png'
};

let loadedCount = 0;
const totalImages = Object.keys(sources).length;

for (let key in sources) {
    images[key] = new Image();
    images[key].src = sources[key];
    images[key].onload = () => {
        loadedCount++;
        document.getElementById('percent-text').innerText = Math.floor((loadedCount/totalImages)*100) + "%";
        if (loadedCount === totalImages) startBtn.style.display = "block";
    };
}

startBtn.onclick = () => {
    document.getElementById('loading-screen').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('controlText').style.display = 'block';
    document.getElementById('scoreDisplay').style.display = 'block';
    resize();
    resetGame();
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

let speed = 8, score = 0, gameOver = false, paused = false, isCountingDown = false;
let tuffJamperUsed = false;
let projectiles = [], playerProjectiles = [];
let player = { x: 0, y: 0, w: 75, h: 75, dy: 0, jumps: 0, recoil: 0 };
let bgScroll = 0, spawnTimer = 0, hitFeedback = 0;

function handleCommand() {
    const val = adminInput.value.trim();
    if (val === '67') {
        adminInput.value = '';
        document.getElementById('easter-egg').style.display = 'block';
        setTimeout(() => { 
            document.getElementById('easter-egg').style.display = 'none'; 
            adminInput.focus(); 
        }, 3000);
    } 
    else if (val === 'TuffJamper') {
        adminInput.value = '';
        if (!tuffJamperUsed) {
            tuffJamperUsed = true;
            pauseOverlay.style.display = 'none';
            document.getElementById('video-container').style.display = 'flex';
            const vid = document.getElementById('tuffVideo');
            vid.play();
            vid.onended = () => {
                document.getElementById('video-container').style.display = 'none';
                pauseOverlay.style.display = 'flex';
                showPopup("YOU GET +1500 FOR BEING TUFF JAMPER", 1500);
            };
        } else {
            showPopup("bro are we fr", 0);
        }
    }
    else { startCountdown(); }
}

function showPopup(msg, bonus) {
    const m = document.getElementById('tuff-message');
    m.innerText = msg;
    m.style.display = 'block';
    score += bonus;
    document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
    setTimeout(() => { m.style.display = 'none'; adminInput.focus(); }, 2500);
}

function togglePause() {
    if (gameOver || isCountingDown || document.getElementById('video-container').style.display === 'flex') return;
    if (!paused) {
        paused = true;
        pauseOverlay.style.display = 'flex';
        adminInput.focus();
    } else {
        handleCommand();
    }
}

function startCountdown() {
    paused = false;
    pauseOverlay.style.display = 'none';
    isCountingDown = true;
    countdownDisplay.style.display = 'block';
    let count = 3;
    countdownDisplay.innerText = count;
    let timer = setInterval(() => {
        count--;
        if (count > 0) countdownDisplay.innerText = count;
        else {
            clearInterval(timer);
            countdownDisplay.style.display = 'none';
            isCountingDown = false;
            update();
        }
    }, 1000);
}

document.getElementById('resumeBtn').onclick = handleCommand;
adminInput.addEventListener('keydown', e => { if (e.key === 'Enter') handleCommand(); });

window.addEventListener('keydown', e => {
    if (e.code === 'Escape') togglePause();
    if (gameOver || paused || isCountingDown || document.activeElement === adminInput) return;
    
    // Double Jump
    if (e.code === 'Space' || e.code === 'ArrowUp') {
        if (player.jumps < 2) {
            player.dy = -16;
            player.jumps++;
        }
    }
    // Throw
    if (e.code === 'ArrowDown' || e.code === 'KeyS' || e.code === 'KeyW') {
        playerProjectiles.push({ x: player.x, y: player.y + 25, vx: -16 });
        player.recoil = 10;
    }
});

function resetGame() {
    score = 0; speed = 8; gameOver = false; paused = false; tuffJamperUsed = false;
    projectiles = []; playerProjectiles = [];
    player.x = canvas.width - 160;
    player.y = canvas.height - 180;
    player.dy = 0; player.jumps = 0;
    document.getElementById('retryBtn').style.display = 'none';
    update();
}

function update() {
    if (gameOver || paused || isCountingDown) return;
    const groundY = canvas.height - 100;
    speed += 0.001; 
    player.dy += 0.85;
    player.y += player.dy;

    if (player.y > groundY - player.h) { 
        player.y = groundY - player.h; player.dy = 0; player.jumps = 0; 
    }
    
    if (player.recoil > 0) player.recoil--;
    bgScroll -= speed;
    spawnTimer++;

    if (spawnTimer > (60 / (speed/8)) + Math.random() * 40) {
        projectiles.push({ x: -50, y: groundY - 55, vx: speed + 4 });
        spawnTimer = 0;
    }

    projectiles.forEach((p, i) => {
        p.x += p.vx;
        if (p.x < player.x + player.w - 20 && p.x + 40 > player.x + 20 && p.y < player.y + player.h && p.y + 40 > player.y) {
            gameOver = true; document.getElementById('retryBtn').style.display = 'block';
        }
    });

    playerProjectiles.forEach((dp, j) => {
        dp.x += dp.vx;
        if (dp.x < 150 && dp.x > 30 && dp.y > groundY - 120) {
            score += 500; hitFeedback = 10; playerProjectiles.splice(j, 1);
        }
    });

    if (hitFeedback > 0) hitFeedback--;
    score += Math.floor(speed / 8);
    document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const bgW = images.bg.width || 100;
    const shiftX = bgScroll % bgW;
    for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) {
        ctx.drawImage(images.bg, x, 0, bgW, canvas.height);
    }
    const groundY = canvas.height - 100;
    if (hitFeedback > 0) ctx.filter = "brightness(3) invert(1)";
    ctx.drawImage(images.enemy, 30, groundY - 130, 130, 130);
    ctx.filter = "none";
    ctx.drawImage(images.bottle, 160, groundY - 70, 50, 50);

    playerProjectiles.forEach(dp => ctx.drawImage(images.dove, dp.x, dp.y, 40, 40));
    projectiles.forEach(p => {
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.beginPath(); ctx.ellipse(p.x + 25, groundY - 10, 20, 6, 0, 0, Math.PI*2); ctx.fill();
        ctx.drawImage(images.wata, p.x, p.y, 55, 55);
    });

    ctx.drawImage(images.player, player.x + player.recoil, player.y, player.w, player.h);
}
</script>
</body>
</html>
