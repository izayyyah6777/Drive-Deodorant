<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Segoe UI', Impact, sans-serif;
        }
        canvas { display: block; }
        
        .ui-overlay { 
            position: absolute; top: 10px; left: 10px; 
            z-index: 100; display: flex; gap: 10px; align-items: center; 
        }
        h1 { 
            position: absolute; top: 10px; width: 100%; text-align: center;
            margin: 0; color: #00ffcc; text-transform: lowercase; pointer-events: none;
            letter-spacing: 2px; font-size: 20px; opacity: 0.7;
        }
        #adminInput { 
            background: rgba(0, 255, 0, 0.1); border: 1px solid #0f0; color: #0f0; 
            padding: 5px; outline: none; width: 100px; font-size: 11px;
        }
        button { background: #222; color: #fff; border: 1px solid #fff; cursor: pointer; padding: 5px 10px; }
        
        .score-board { 
            position: absolute; bottom: 20px; left: 20px; 
            font-size: 28px; font-weight: bold; color: #00ffcc; pointer-events: none;
        }
        #retryBtn { 
            display: none; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); padding: 20px 40px; 
            font-size: 24px; background: #00ffcc; color: #000; 
            border: none; cursor: pointer; font-weight: bold; z-index: 200;
        }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <input type="text" id="adminInput" placeholder="Code...">
        <button id="pauseBtn">PAUSE</button>
    </div>

    <h1>drive deodorant</h1>
    <div class="score-board" id="scoreDisplay">SCORE: 0</div>
    <button id="retryBtn" onclick="resetGame()">RETRY?</button>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const adminInput = document.getElementById('adminInput');
const scoreDisplay = document.getElementById('scoreDisplay');
const retryBtn = document.getElementById('retryBtn');

// Resize canvas to full screen
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- Assets ---
const img = {
    player: new Image(), enemy: new Image(), dove: new Image(),
    bottle: new Image(), wata: new Image(), bg: new Image()
};
img.player.src = 'Jamper.png';
img.enemy.src = 'Lerma.png';
img.dove.src = 'dove.png';
img.bottle.src = 'bottle.png';
img.wata.src = 'wata.png';
img.bg.src = 'Brixk.png';

// --- Dynamic Variables ---
let currentScrollSpeed = 8;
let currentGravity = 0.9;
let lastLevelScore = 0;

// --- State ---
let score = 0;
let gameOver = false;
let paused = false;
let isAdmin = false;
let isFlying = false;
let lastJumpPress = 0;
let angle = 0;
let bgScroll = 0;
let projectiles = [];

let player = { x: 150, y: 0, w: 50, h: 50, dy: 0, grounded: false };
const keys = {};

adminInput.oninput = () => { if(adminInput.value === "Admin Mode") isAdmin = true; };
document.getElementById('pauseBtn').onclick = () => { paused = !paused; canvas.focus(); };

function resetGame() {
    score = 0; gameOver = false; projectiles = []; 
    player.y = canvas.height - 150; player.dy = 0; angle = 0;
    currentScrollSpeed = 8; currentGravity = 0.9; lastLevelScore = 0;
    retryBtn.style.display = 'none';
    requestAnimationFrame(update);
}

window.addEventListener('keydown', e => {
    if (document.activeElement === adminInput) return;
    keys[e.code] = true;

    if (e.code === 'Space' && !paused && !gameOver) {
        const now = Date.now();
        if (isAdmin && (now - lastJumpPress < 250)) isFlying = !isFlying;
        lastJumpPress = now;

        if (!isFlying && player.grounded) {
            player.dy = -15 - (currentScrollSpeed * 0.1); 
            player.grounded = false;
            angle = (angle + 90) % 360;
        }
    }

    if ((e.code === 'KeyW' || e.code === 'ArrowUp') && !gameOver && !paused) {
        projectiles.push({ x: player.x + 40, y: player.y + 10, vx: 15, vy: 0, type: 'dove' });
    }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function update() {
    if (paused || gameOver) return;

    const groundY = canvas.height - 100;

    if (score - lastLevelScore >= 1000) {
        currentScrollSpeed += 1.2;
        currentGravity += 0.04;
        lastLevelScore = score;
    }

    if (isFlying) {
        if (keys['KeyW'] || keys['ArrowUp']) player.y -= 10;
        if (keys['KeyS'] || keys['ArrowDown']) player.y += 10;
        if (keys['KeyA'] || keys['ArrowLeft']) player.x -= 10;
        if (keys['KeyD'] || keys['ArrowRight']) player.x += 10;
    } else {
        player.dy += currentGravity;
        player.y += player.dy;
        if (player.y > groundY - player.h) { 
            player.y = groundY - player.h; 
            player.dy = 0; 
            player.grounded = true; 
        }
        bgScroll -= currentScrollSpeed;
    }

    // Boss Attacks (Lerma is always on the right edge)
    if (Math.random() < 0.04 + (currentScrollSpeed * 0.002)) {
        projectiles.push({
            x: canvas.width - 50, y: canvas.height,
            vx: -(currentScrollSpeed + 3 + Math.random() * 5),
            vy: -(Math.random() * 15 + 8),
            type: 'wata'
        });
    }

    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx; p.y += p.vy;

        if (p.type === 'wata' && !isAdmin) {
            if (p.x < player.x + player.w && p.x + 25 > player.x &&
                p.y < player.y + player.h && p.y + 25 > player.y) {
                gameOver = true;
                retryBtn.style.display = 'block';
            }
        }
        
        if (p.type === 'dove' && p.x > canvas.width - 100) {
            score += 100;
            projectiles.splice(i, 1);
        } else if (p.x < -100 || p.y < -200 || p.y > canvas.height + 100) {
            projectiles.splice(i, 1);
        }
    }

    score++;
    scoreDisplay.innerText = `SCORE: ${score}`;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Full Screen Scrolling Background
    if (img.bg.complete) {
        const bgW = img.bg.width;
        const bgH = img.bg.height;
        const shiftX = bgScroll % bgW;
        
        // Draw enough tiles to cover width and height
        for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) {
            for (let y = 0; y < canvas.height; y += bgH) {
                ctx.drawImage(img.bg, x, y, bgW, bgH);
            }
        }
    }

    const groundY = canvas.height - 100;

    // Neon Ground
    ctx.strokeStyle = "#00ffcc";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(canvas.width, groundY); ctx.stroke();

    // Lerma (Stays at far right)
    ctx.drawImage(img.enemy, canvas.width - 120, groundY - 100, 100, 100);
    ctx.drawImage(img.bottle, canvas.width - 150, groundY - 60, 45, 45);

    // Player
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    if (!isFlying) ctx.rotate(angle * Math.PI / 180);
    ctx.drawImage(img.player, -player.w/2, -player.h/2, player.w, player.h);
    if (isAdmin && isFlying) {
        ctx.strokeStyle = "#0f0"; ctx.lineWidth = 3;
        ctx.strokeRect(-player.w/2, -player.h/2, player.w, player.h);
    }
    ctx.restore();

    // Projectiles
    projectiles.forEach(p => {
        const sprite = p.type === 'dove' ? img.dove : img.wata;
        ctx.drawImage(sprite, p.x, p.y, 30, 30);
    });
}

// Start on first load
resetGame();
</script>
</body>
</html>
