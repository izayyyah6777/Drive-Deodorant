<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Segoe UI', Impact, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: none; } 
        
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000 url('Jamper.png') no-repeat center;
            background-size: contain; z-index: 500;
        }

        #percent-text {
            font-size: 100px; font-weight: bold; color: #00ffcc;
            text-shadow: 0 0 30px #000, 5px 5px 0px #000;
        }

        #startBtn {
            display: none; margin-top: 25px; padding: 15px 50px;
            background: #00ffcc; color: #000; border: none;
            font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 24px; text-transform: uppercase;
            box-shadow: 0 0 20px #00ffcc; transition: 0.2s;
        }

        .score-board { position: absolute; bottom: 20px; left: 20px; font-size: 32px; font-weight: bold; color: #00ffcc; display: none; text-shadow: 2px 2px #000; }
        #retryBtn { display: none; position: absolute; padding: 20px 40px; font-size: 24px; background: #00ffcc; color: #000; border: none; cursor: pointer; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 600; font-weight: bold;}
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="percent-text">0%</div>
        <button id="startBtn">START BOTTLE</button>
    </div>

    <div class="score-board" id="scoreDisplay">SCORE: 0</div>
    <button id="retryBtn" onclick="resetGame()">RETRY?</button>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const percentText = document.getElementById('percent-text');
const startBtn = document.getElementById('startBtn');

const images = {};
const sources = {
    player: 'Jamper.png',
    enemy: 'Lerma.png',
    dove: 'dove.png',
    bottle: 'bottle.png',
    wata: 'wata.png',
    bg: 'Brixk.png'
};

let loadedCount = 0;
const totalImages = Object.keys(sources).length;

for (let key in sources) {
    images[key] = new Image();
    images[key].src = sources[key];
    images[key].onload = () => {
        loadedCount++;
        let percent = Math.floor((loadedCount / totalImages) * 100);
        percentText.innerText = percent + "%";
        if (loadedCount === totalImages) startBtn.style.display = "inline-block";
    };
    images[key].onerror = () => { percentText.innerText = "ERROR"; };
}

startBtn.onclick = () => {
    document.getElementById('loading-screen').style.display = 'none';
    canvas.style.display = 'block';
    document.getElementById('scoreDisplay').style.display = 'block';
    resize();
    resetGame();
};

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);

let speed = 8;
let score = 0;
let gameOver = false;
let bgScroll = 0;
let projectiles = [];
let playerProjectiles = [];
let player = { x: 0, y: 0, w: 70, h: 70, dy: 0, grounded: false, recoil: 0 };
let hitFeedback = 0;
let spawnTimer = 0;

function resetGame() {
    score = 0; speed = 8; gameOver = false; projectiles = []; playerProjectiles = [];
    player.x = canvas.width - 150;
    player.y = canvas.height - 170; 
    player.dy = 0;
    document.getElementById('retryBtn').style.display = 'none';
    update();
}

window.addEventListener('keydown', e => {
    if (gameOver) return;
    
    // JUMP (Space)
    if (e.code === 'Space' && player.grounded) {
        player.dy = -18; 
        player.grounded = false;
    }

    // THROW DOVE (W, S, or ArrowDown)
    if (e.code === 'KeyW' || e.code === 'KeyS' || e.code === 'ArrowDown') {
        playerProjectiles.push({ x: player.x, y: player.y + 20, vx: -15 });
        player.recoil = 5; // Adds a tiny visual kickback
    }
});

function update() {
    if (gameOver) return;
    const groundY = canvas.height - 100;

    speed += 0.001; 

    player.dy += 0.9;
    player.y += player.dy;
    if (player.y > groundY - player.h) { 
        player.y = groundY - player.h; player.dy = 0; player.grounded = true; 
    }
    
    if (player.recoil > 0) player.recoil--;

    bgScroll -= speed;

    spawnTimer++;
    if (spawnTimer > (60 / (speed/8)) + Math.random() * 30) {
        projectiles.push({ x: -50, y: groundY - 50, vx: speed + 4 });
        spawnTimer = 0;
    }

    // Enemy Projectiles (Wata)
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i]; p.x += p.vx;
        if (p.x < player.x + player.w - 15 && p.x + 40 > player.x + 15 && p.y < player.y + player.h && p.y + 40 > player.y) {
            gameOver = true; document.getElementById('retryBtn').style.display = 'block';
        }
        if (p.x > canvas.width + 100) projectiles.splice(i, 1);
    }

    // Player Projectiles (Dove)
    for (let j = playerProjectiles.length - 1; j >= 0; j--) {
        const dp = playerProjectiles[j]; dp.x += dp.vx;
        // Collision with Lerma (approximate position)
        if (dp.x < 150 && dp.x > 30 && dp.y > groundY - 120) {
            score += 500;
            hitFeedback = 10;
            playerProjectiles.splice(j, 1);
        } else if (dp.x < -50) {
            playerProjectiles.splice(j, 1);
        }
    }

    if (hitFeedback > 0) hitFeedback--;
    score += Math.floor(speed / 8); 
    document.getElementById('scoreDisplay').innerText = `SCORE: ${score}`;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    const bgW = images.bg.width || 100;
    const shiftX = bgScroll % bgW;
    for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) {
        ctx.drawImage(images.bg, x, 0, bgW, canvas.height);
    }

    const groundY = canvas.height - 100;
    
    // Lerma
    if (hitFeedback > 0) ctx.filter = "brightness(3) hue-rotate(90deg)";
    ctx.drawImage(images.enemy, 30, groundY - 120, 120, 120);
    ctx.filter = "none";
    ctx.drawImage(images.bottle, 140, groundY - 70, 50, 50);

    // Doves
    playerProjectiles.forEach(dp => ctx.drawImage(images.dove, dp.x, dp.y, 40, 40));

    // Wata
    projectiles.forEach(p => {
        ctx.fillStyle = "rgba(0, 0, 0, 0.3)";
        ctx.beginPath();
        ctx.ellipse(p.x + 25, groundY - 10, 20, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.drawImage(images.wata, p.x, p.y, 50, 50);
    });

    // Jamper (with recoil offset)
    ctx.drawImage(images.player, player.x + player.recoil, player.y, player.w, player.h);
}
</script>
</body>
</html>
