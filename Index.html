<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <link rel="icon" type="image/png" href="Jamper.png">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; 
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
        }
        canvas { display: none; background: #000; } 
        
        #loading-screen {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: #000 url('Jamper.png') no-repeat center;
            background-size: contain; z-index: 500;
        }

        #startBtn {
            margin-top: 20px; padding: 20px 60px;
            background: #00ff66; color: #000; border: none;
            font-weight: bold; cursor: pointer; border-radius: 5px;
            font-size: 28px; text-transform: uppercase;
            box-shadow: 0 0 20px #00ff66;
        }

        /* Sidebar UI */
        #pause-overlay {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0, 10, 0, 0.95);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; gap: 40px;
        }

        .menu-sidebar { display: flex; flex-direction: column; gap: 15px; width: 250px; }
        .menu-btn {
            background: #111; border: 2px solid #00ff66; color: #00ff66;
            padding: 15px; font-size: 18px; font-weight: bold;
            text-align: left; cursor: pointer; text-transform: uppercase;
        }
        .menu-btn:hover { background: #00ff66; color: #000; }

        .content-panel { width: 450px; height: 350px; border: 2px solid #00ff66; background: #000; display: flex; flex-direction: column; }
        .panel-header { background: #00ff66; color: #000; padding: 10px; font-weight: bold; }
        .panel-body { padding: 20px; color: #00ff66; flex-grow: 1; display: flex; flex-direction: column; gap: 15px; }

        #adminInput { background: #050505; border: 1px solid #00ff66; color: #00ff66; padding: 12px; font-size: 18px; outline: none; width: 100%; box-sizing: border-box; }

        /* Video System */
        #video-container { position: absolute; width: 100%; height: 100%; background: #000; display: none; z-index: 4000; justify-content: center; align-items: center; }
        #video-shield { position: absolute; width: 100%; height: 100%; z-index: 4001; }
        #tuffVideo { max-width: 90vw; max-height: 90vh; border: 2px solid #00ff66; pointer-events: none; }

        #tuff-message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00ff66; font-size: 24px; font-weight: bold; text-align: center;
            background: #000; padding: 25px; border: 2px solid #00ff66; display: none; z-index: 5000;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loading-screen"><button id="startBtn">PLAY GAME</button></div>

    <div id="video-container">
        <div id="video-shield"></div>
        <video id="tuffVideo" src="Jandel.mp4" playsinline></video>
    </div>
    
    <div id="tuff-message"></div>

    <div id="pause-overlay">
        <div class="menu-sidebar">
            <button class="menu-btn" onclick="handleCommand()">Execute CMD</button>
            <button class="menu-btn" onclick="location.reload()">Reset Session</button>
            <div style="margin-top: 20px; color: #008844; font-size: 11px;">SESSION_SCORE: <span id="session-score-display">0</span></div>
        </div>
        <div class="content-panel">
            <div class="panel-header">COMMAND_TERMINAL_ROOT</div>
            <div class="panel-body">
                <input type="text" id="adminInput" placeholder="READY FOR INPUT..." autofocus autocomplete="off">
                <div id="status-line" style="font-size: 12px; color: #00ff66;">FLIGHT_MOD: INACTIVE</div>
                <button class="menu-btn" style="text-align: center; margin-top: auto;" onclick="handleCommand()">Execute</button>
            </div>
        </div>
    </div>

    <button id="retryBtn" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); padding:20px 40px; background:#00ff66; font-weight:bold; cursor:pointer; z-index:600;" onclick="resetGame()">RETRY?</button>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const pauseOverlay = document.getElementById('pause-overlay');
const adminInput = document.getElementById('adminInput');
const sessionScoreDisplay = document.getElementById('session-score-display');
const videoContainer = document.getElementById('video-container');
const tuffVideo = document.getElementById('tuffVideo');

let speed = 8, score = 0, gameOver = false, paused = false, isVideoPlaying = false;
let flightEnabled = false;
let projectiles = [], playerProjectiles = [];
let player = { x: 0, y: 0, w: 75, h: 75, dy: 0, jumps: 0, recoil: 0 };
let bgScroll = 0, spawnTimer = 0, hitFeedback = 0;

const images = {};
const sources = { player: 'Jamper.png', enemy: 'Lerma.png', dove: 'dove.png', bottle: 'bottle.png', wata: 'wata.png', bg: 'Brixk.png' };
for (let key in sources) { images[key] = new Image(); images[key].src = sources[key]; }

// MEDIA LOCK: Overwrite system behavior to block pausing
if ('mediaSession' in navigator) {
    navigator.mediaSession.setActionHandler('pause', () => { 
        if(isVideoPlaying) tuffVideo.play(); // Force play if system tries to pause
    });
}

function handleCommand() {
    const val = adminInput.value.trim();
    const groundY = canvas.height - 100;

    if (val === 'Admin Mode On') {
        flightEnabled = true;
        document.getElementById('status-line').innerText = "FLIGHT_MOD: ACTIVE";
        showPopup("FLIGHT ENABLED", 0);
        adminInput.value = '';
    } 
    else if (val === 'Admin Mode Off') {
        flightEnabled = false;
        player.dy = 0;
        player.y = groundY - player.h; // Instant snap back to ground
        document.getElementById('status-line').innerText = "FLIGHT_MOD: INACTIVE";
        showPopup("FLIGHT DISABLED // RETURNING TO POST", 0);
        adminInput.value = '';
    }
    else if (val === 'TuffJamper') {
        adminInput.value = '';
        isVideoPlaying = true;
        pauseOverlay.style.display = 'none';
        videoContainer.style.display = 'flex';
        tuffVideo.play();
        tuffVideo.onended = () => {
            isVideoPlaying = false;
            videoContainer.style.display = 'none';
            pauseOverlay.style.display = 'flex';
            showPopup("BONUS: +1500", 1500);
        };
    } else { startCountdown(); }
}

function showPopup(msg, bonus) {
    const m = document.getElementById('tuff-message');
    m.innerText = msg; m.style.display = 'block';
    score += bonus;
    setTimeout(() => { m.style.display = 'none'; adminInput.focus(); }, 2000);
}

function togglePause() {
    if (gameOver || isVideoPlaying) return;
    if (!paused) {
        paused = true;
        sessionScoreDisplay.innerText = score;
        pauseOverlay.style.display = 'flex';
        adminInput.focus();
    } else { handleCommand(); }
}

function startCountdown() {
    paused = false; pauseOverlay.style.display = 'none';
    const originalSpeed = speed; speed = 0;
    let count = 3;
    let timer = setInterval(() => {
        count--;
        if (count <= 0) { clearInterval(timer); speed = originalSpeed; update(); }
    }, 1000);
}

window.addEventListener('keydown', e => {
    if (e.code === 'Escape') togglePause();
    if (gameOver || paused || speed === 0 || isVideoPlaying) return;
    
    if (flightEnabled) {
        if (e.code === 'Space' || e.code === 'ArrowUp') player.dy = -10;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') player.dy = 10;
    } else {
        if ((e.code === 'Space' || e.code === 'ArrowUp') && player.jumps < 2) { player.dy = -16; player.jumps++; }
    }
    
    if (e.code === 'KeyW') {
        playerProjectiles.push({ x: player.x, y: player.y + 25, vx: -16 });
        player.recoil = 10;
    }
});

startBtn.onclick = () => { document.getElementById('loading-screen').style.display = 'none'; canvas.style.display = 'block'; resize(); resetGame(); };
