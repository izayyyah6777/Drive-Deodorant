<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <link rel="icon" type="image/png" href="Jamper.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; }
        canvas { display: none; background: #000; } 
        
        /* ERROR SCREEN */
        #error-screen { 
            position: absolute; width: 100%; height: 100%; background: #000; 
            color: #ff4444; display: none; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            padding: 40px; z-index: 10000; border: 10px solid #ff4444; box-sizing: border-box;
        }

        /* START SCREEN */
        #loading-screen { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            background: #000 url('Jamper.png') no-repeat center; 
            background-size: contain; z-index: 500; 
        }
        #startBtn { 
            margin-top: 20px; padding: 25px 80px; background: #00ff66; color: #000; 
            border: none; font-weight: bold; cursor: pointer; border-radius: 8px; 
            font-size: 32px; text-transform: uppercase; box-shadow: 0 0 30px #00ff66; 
        }
        
        /* PAUSE MENU */
        #pause-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0, 5, 0, 0.98); display: none; justify-content: center; align-items: center; z-index: 1000; gap: 40px; }
        .menu-sidebar { display: flex; flex-direction: column; gap: 15px; width: 250px; }
        .menu-btn { background: #111; border: 2px solid #00ff66; color: #00ff66; padding: 15px; font-size: 18px; font-weight: bold; text-align: left; cursor: pointer; text-transform: uppercase; }
        .menu-btn:hover { background: #00ff66; color: #000; }
        
        .content-panel { width: 450px; height: 350px; border: 2px solid #00ff66; background: #000; display: flex; flex-direction: column; position: relative; }
        .panel-header { background: #00ff66; color: #000; padding: 10px; font-weight: bold; }
        .copy-btn { position: absolute; top: 10px; right: 10px; color: #000; font-size: 10px; font-weight: bold; }

        .panel-body { padding: 25px; color: #00ff66; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .fact-box { border-top: 1px solid #004422; padding-top: 20px; width: 100%; }
        .fact-label { font-size: 12px; color: #008844; margin-bottom: 10px; text-transform: uppercase; }
        .fact-text { font-size: 18px; font-style: italic; line-height: 1.4; }

        #retryBtn { display:none; position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); padding:20px 40px; background:#00ff66; font-weight:bold; cursor:pointer; z-index:600; border:none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="error-screen">
        <h1 style="font-size: 50px; margin-bottom: 20px;">⚠️ FILE ERROR ⚠️</h1>
        <p id="error-msg" style="font-size: 22px; max-width: 900px; line-height: 1.5; font-weight: bold;"></p>
    </div>

    <div id="loading-screen">
        <button id="startBtn">PLAY GAME</button>
    </div>

    <div id="pause-overlay">
        <div class="menu-sidebar">
            <button class="menu-btn" onclick="togglePause()">Continue</button>
            <button class="menu-btn" onclick="location.reload()">Restart</button>
        </div>
        <div class="content-panel">
            <div class="panel-header">SYSTEM_PAUSED</div>
            <div class="copy-btn">© 2026 IZAYYAH_DEV</div>
            <div class="panel-body">
                <div class="fact-box">
                    <div class="fact-label">Did you know?</div>
                    <div id="fact-display" class="fact-text">Loading fun fact...</div>
                </div>
            </div>
        </div>
    </div>

    <button id="retryBtn" onclick="resetGame()">RETRY?</button>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const startBtn = document.getElementById('startBtn');
const factDisplay = document.getElementById('fact-display');

let speed = 8, score = 0, gameOver = false, paused = false;
let projectiles = [], playerProjectiles = [], player = { x: 0, y: 0, w: 75, h: 75, dx: 0, dy: 0, jumps: 0, rotation: 0 };
let bgScroll = 0, spawnTimer = 0, hasFatalError = false;

// VFX STATE
let lermaShake = 0;
const facts = [
    "Doves are actually just fancy pigeons.",
    "Geometry Dash was originally called 'The Impossible Game 2'.",
    "Honey never spoils. Archaeologists found edible honey in ancient Egyptian tombs.",
    "Octopuses have three hearts.",
    "Bananas are technically berries, but strawberries aren't.",
    "The world's smallest penguin is only 13 inches tall."
];

function triggerFileError(fileName) {
    hasFatalError = true;
    document.getElementById('error-screen').style.display = 'flex';
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('error-msg').innerText = `the file (${fileName}) is no where to be found on your Computer/PC Because of this the game has been unplayable please check in with izayah by @Izayyah_thedev on tt I also have a bottle pfp if not you might have to wait for files to load if you have it in the zip`;
}

const images = {};
const sources = { player: 'Jamper.png', enemy: 'Lerma.png', dove: 'dove.png', bottle: 'bottle.png', wata: 'wata.png', bg: 'Brixk.png' };
for (let key in sources) {
    images[key] = new Image();
    images[key].onerror = () => triggerFileError(sources[key]);
    images[key].src = sources[key];
}

window.addEventListener('keydown', e => {
    if (e.code === 'Escape') togglePause();
    if (gameOver || paused || hasFatalError) return;

    if (['Space', 'ArrowUp', 'KeyW'].includes(e.code) && player.jumps < 2) { 
        player.dy = -16; player.jumps++; 
    }
    if (['KeyS', 'ArrowDown'].includes(e.code)) {
        playerProjectiles.push({ x: player.x, y: player.y + 25, vx: -16 });
    }
});

function togglePause() {
    if (gameOver || hasFatalError) return;
    paused = !paused;
    if (paused) {
        factDisplay.innerText = facts[Math.floor(Math.random() * facts.length)];
        document.getElementById('pause-overlay').style.display = 'flex';
    } else {
        document.getElementById('pause-overlay').style.display = 'none';
        update();
    }
}

startBtn.onclick = () => {
    if (hasFatalError) return;
    document.getElementById('loading-screen').style.display = 'none';
    canvas.style.display = 'block';
    resize(); resetGame();
};

window.addEventListener('resize', resize);
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function resetGame() {
    score = 0; gameOver = false; paused = false; projectiles = []; playerProjectiles = [];
    player.x = canvas.width - 160; player.y = canvas.height - 180; player.dy = 0; player.rotation = 0;
    lermaShake = 0;
    document.getElementById('retryBtn').style.display = 'none';
    update();
}

function update() {
    if (gameOver || paused || hasFatalError) return;
    const groundY = canvas.height - 100;

    player.dy += 0.85;
    player.y += player.dy;
    
    if (player.y < groundY - player.h) {
        player.rotation += 0.15; 
    } else {
        player.y = groundY - player.h;
        player.dy = 0; player.jumps = 0;
        player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
    }

    if (player.y < 0) player.y = 0;
    bgScroll -= speed; spawnTimer++;
    if (spawnTimer > 60) { projectiles.push({ x: -50, y: groundY - 55, vx: speed + 4 }); spawnTimer = 0; }
    
    projectiles.forEach((p) => {
        p.x += p.vx;
        if (p.x < player.x + player.w - 20 && p.x + 40 > player.x + 20 && p.y < player.y + player.h && p.y + 40 > player.y) {
            gameOver = true; document.getElementById('retryBtn').style.display = 'block';
        }
    });

    playerProjectiles.forEach((dp, j) => {
        dp.x += dp.vx;
        if (dp.x < 150 && dp.x > 30 && dp.y > groundY - 120) { 
            score += 500; 
            playerProjectiles.splice(j, 1);
            lermaShake = 15;
        }
    });

    if (lermaShake > 0) lermaShake--;
    score += 1;
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const bgW = images.bg.width || 100;
    const shiftX = bgScroll % bgW;
    for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) ctx.drawImage(images.bg, x, 0, bgW, canvas.height);
    
    const groundY = canvas.height - 100;
    
    // DRAW LERMA (WITH SHAKE)
    let lx = 30;
    let ly = groundY - 130;
    if (lermaShake > 0) {
        lx += (Math.random() - 0.5) * 15;
        ly += (Math.random() - 0.5) * 15;
    }
    ctx.drawImage(images.enemy, lx, ly, 130, 130);
    ctx.drawImage(images.bottle, lx + 130, groundY - 70, 50, 50);

    // DRAW DOVES
    playerProjectiles.forEach(dp => ctx.drawImage(images.dove, dp.x, dp.y, 40, 40));
    
    // DRAW WATER WITH NEON SHADOW
    projectiles.forEach(p => {
        ctx.save(); 
        ctx.shadowBlur = 20; 
        ctx.shadowColor = "cyan"; 
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.drawImage(images.wata, p.x, p.y, 55, 55);
        ctx.restore();
    });

    // DRAW JAMPER
    ctx.save();
    ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
    ctx.rotate(player.rotation);
    ctx.drawImage(images.player, -player.w / 2, -player.h / 2, player.w, player.h);
    ctx.restore();

    ctx.font = "bold 28px Courier New"; ctx.fillStyle = "#00ff66"; ctx.fillText(`SCORE: ${score}`, 20, 40); 
}
</script>
</body>
</html>
