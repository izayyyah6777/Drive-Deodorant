<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <link rel="icon" type="image/png" href="Jamper.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* MAIN GAME - BRICK BACKGROUND */
        #game-canvas { 
            display: block; 
            background-image: url('brick.png'); /* Main game brick background */
            background-size: repeat;
            width: 100vw;
            height: 100vh;
        }

        /* UI OVERLAY */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 1000; gap: 20px; background: rgba(0,0,0,0.85); }
        
        /* BOX DESIGN */
        .box { border: 2px solid #00ff66; background: #000; height: 500px; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0, 255, 102, 0.2); }
        .box-header { background: #00ff66; color: #000; padding: 10px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; }
        .box-body { padding: 15px; color: #00ff66; overflow-y: auto; flex-grow: 1; }

        .side-menu { display: flex; flex-direction: column; gap: 12px; width: 200px; }
        .btn { background: #000; border: 2px solid #00ff66; color: #00ff66; padding: 12px; cursor: pointer; text-align: left; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: #00ff66; color: #000; }

        /* TIKTOK FARLANDS PORTRAIT */
        #farlands-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('TIKTOKFARLANDS.png') center/cover; display: none; z-index: 5000; flex-direction: column; justify-content: center; align-items: center; }
        #farlands-video { width: 380px; height: 675px; object-fit: cover; border: 4px solid #ff8800; box-shadow: 0 0 35px #ff8800; }
        
        .orange-btn { background: #cc7700; border: none; color: #fff; width: 65px; height: 65px; border-radius: 10px; font-size: 28px; cursor: pointer; box-shadow: 0 0 15px #ff8800; margin-top: 20px; }
        #esc-warn { color: #ff0000; font-weight: bold; margin-top: 15px; display: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="pause-screen" class="overlay">
        <div class="side-menu">
            <button class="btn" onclick="togglePause()">CONTINUE</button>
            <button class="btn" onclick="toggleBox('terminal')">TERMINAL</button>
            <button class="btn" onclick="toggleBox('credits')">CREDITS</button>
            <button class="btn" onclick="triggerFunFact()">FUN FACTS</button>
            <button class="btn" onclick="location.reload()">RESTART</button>
        </div>

        <div class="box" id="juke-box" style="width: 450px;">
            <div class="box-header"><span>SYSTEM_JUKEBOX</span><span>© 2026 IZAYYAH_DEV</span></div>
            <div class="box-body">
                <div class="btn" style="width:92%; margin-bottom:8px;" onclick="play('BikeRides.mp3')">Bike Rides</div>
                <div class="btn" style="width:92%; margin-bottom:8px;" onclick="play('Paris.mp3')">Jazz Paris</div>
                <div class="btn" style="width:92%; margin-bottom:8px;" onclick="play('Chicken.mp3')">If I Had A Chicken</div>
            </div>
        </div>

        <div class="box" id="term-box" style="width: 320px; display:none;">
            <div class="box-header"><span>TERMINAL</span></div>
            <div class="box-body">
                <div id="log">> Initializing Jamper System...</div>
                <div id="log">> Characters: Lerma, Jamper, Dove loaded.</div>
                <input type="text" id="cmd" style="background:transparent; border:none; color:#00ff66; width:100%; outline:none; border-top:1px solid #004411; margin-top:10px; padding-top:5px;" placeholder="COMMAND_">
            </div>
        </div>

        <div class="box" id="cred-box" style="width: 280px; display:none;">
            <div class="box-header"><span>CREDITS</span></div>
            <div class="box-body">
                <p><strong>DEVELOPER:</strong></p>
                <p>@izayyah_dev</p>
                <br>
                <p><strong>CAST:</strong></p>
                <p>- Jamper</p>
                <p>- Lerma</p>
                <p>- Bottle</p>
                <p>- Dove</p>
                <br>
                <p><strong>AUDIO:</strong></p>
                <p>YouTube Audio Library</p>
            </div>
        </div>
    </div>

    <div id="farlands-ui">
        <video id="farlands-video"></video>
        <button class="orange-btn" onclick="toggleVid()">⏸</button>
        <div id="esc-warn">YOU CAN'T ESCAPE THE FARLANDS</div>
    </div>

    <canvas id="game-canvas"></canvas>

<script>
    const vids = ['speed.mp4', 'man.mp4', 'hero.mp4', 'tiktok.mp4', 'bart.mp4', 'Kid.mp4', 'bear.mp4'];
    const audio = new Audio();
    const video = document.getElementById('farlands-video');
    let secretActive = false;

    // Terminal logic for the secret
    document.getElementById('cmd').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') {
            if(e.target.value.toLowerCase() === 'tiktok') {
                secretActive = true;
                document.getElementById('pause-screen').style.display = 'none';
                document.getElementById('farlands-ui').style.display = 'flex';
                video.src = vids[0]; // speed.mp4 first
                video.play();
            }
            e.target.value = '';
        }
    });

    function triggerFunFact() {
        const rand = Math.random();
        if(rand < 0.01) {
            alert("did you know that this fact is so rare but it only comes as 1% chance and also dont type TikTok into the terminal");
        } else {
            const facts = ["Lerma is watching the bottle.", "Dove flies over the brick walls.", "Jamper is ready."];
            alert(facts[Math.floor(Math.random() * facts.length)]);
        }
    }

    function toggleBox(id) {
        const b = document.getElementById(id === 'terminal' ? 'term-box' : 'cred-box');
        b.style.display = b.style.display === 'none' ? 'flex' : 'none';
    }

    function togglePause() {
        const p = document.getElementById('pause-screen');
        p.style.display = p.style.display === 'none' ? 'flex' : 'none';
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === 'Escape') {
            if(secretActive) {
                const w = document.getElementById('esc-warn');
                w.style.display = 'block';
                setTimeout(() => w.style.display = 'none', 2000);
            } else {
                togglePause();
            }
        }
        // Infinite random scroll
        if(secretActive && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
            video.src = vids[Math.floor(Math.random() * vids.length)];
            video.play();
        }
    });

    function toggleVid() { video.paused ? video.play() : video.pause(); }
    function play(s) { audio.src = s; audio.play(); }

    const c = document.getElementById('game-canvas');
    c.width = window.innerWidth; c.height = window.innerHeight;
</script>
</body>
</html>
