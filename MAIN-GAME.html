<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Deodorant</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* START SCREEN */
        #start-screen { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .start-btn { background: #00ff66; border: none; padding: 25px 60px; font-size: 32px; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #00ff66; border-radius: 5px; }

        /* MAIN GAME WORLD - USING BRIXK.PNG */
        #game-view { 
            position: absolute; width: 100vw; height: 100vh; 
            background: url('Brixk.png') repeat; /* Matches your file list */
            background-size: 150px; 
            display: none; 
        }

        /* SPRITE POSITIONS & SCALING */
        .sprite { position: absolute; bottom: 20%; height: 160px; width: auto; image-rendering: pixelated; }
        #jamper { left: 10%; }
        #lerma  { left: 30%; height: 180px; }
        #bottle { left: 55%; height: 90px; }
        #dove   { right: 15%; top: 15%; height: 100px; }

        /* TIKTOK FARLANDS - THE PLAYER FIX */
        #farlands-ui { 
            position: fixed; inset: 0; 
            background: url('TIKTOKFARLANDS.png') no-repeat center center; 
            background-size: cover; 
            display: none; z-index: 9000; 
            flex-direction: column; justify-content: center; align-items: center; 
        }

        #farlands-video { 
            width: 450px; /* Large mobile portrait width */
            height: 800px; /* High-definition portrait height */
            background: #000;
            object-fit: contain; 
            border: 5px solid #ff8800; 
            box-shadow: 0 0 50px #ff8800; 
        }

        .orange-ctrl { 
            background: #cc7700; color: white; border: none; width: 80px; height: 80px; 
            border-radius: 15px; margin-top: 25px; font-size: 35px; cursor: pointer; 
            box-shadow: 0 0 20px #ff8800; 
        }

        #esc-msg { position: absolute; bottom: 40px; color: red; font-weight: bold; font-size: 24px; display: none; text-shadow: 0 0 10px #000; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button class="start-btn" onclick="startGame()">PLAY GAME</button>
    </div>

    <div id="game-view">
        <img src="Jamper.png" id="jamper" class="sprite" alt="Jamper">
        <img src="Lerma.png"  id="lerma"  class="sprite" alt="Lerma">
        <img src="bottle.png" id="bottle" class="sprite" alt="Bottle">
        <img src="dove.png"   id="dove"   class="sprite" alt="Dove">
    </div>

    <div id="farlands-ui">
        <video id="farlands-video" loop></video>
        <button class="orange-ctrl" onclick="toggleVid()">⏸</button>
        <div id="esc-msg">YOU CAN'T ESCAPE THE FARLANDS</div>
    </div>

<script>
    const vids = ['speed.mp4', 'man.mp4', 'hero.mp4', 'tiktok.mp4', 'bart.mp4', 'Kid.mp4', 'bear.mp4'];
    const vidPlayer = document.getElementById('farlands-video');
    const farlands = document.getElementById('farlands-ui');
    const escMsg = document.getElementById('esc-msg');
    let isFarlands = false;
    let inputBuffer = "";

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
    }

    // Secret trigger and Escape logic
    window.addEventListener('keydown', (e) => {
        if (!isFarlands) {
            inputBuffer += e.key.toLowerCase();
            if (inputBuffer.includes("tiktok")) {
                isFarlands = true;
                document.getElementById('game-view').style.display = 'none';
                farlands.style.display = 'flex';
                vidPlayer.src = vids[0];
                vidPlayer.play();
                inputBuffer = "";
            }
        } else {
            // TikTok Farlands reference: You can't escape
            if (e.key === "Escape") {
                escMsg.style.display = 'block';
                setTimeout(() => { escMsg.style.display = 'none'; }, 2000);
            }
            // Vertical Scroll Simulation
            if (e.key === "ArrowUp" || e.key === "ArrowDown") {
                vidPlayer.src = vids[Math.floor(Math.random() * vids.length)];
                vidPlayer.play();
            }
        }
    });

    function toggleVid() { vidPlayer.paused ? vidPlayer.play() : vidPlayer.pause(); }
</script>
</body>
</html>
