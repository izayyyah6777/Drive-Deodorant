<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Deodorant</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        
        /* THE GAME WORLD (Visible Background) */
        #game-world { position: relative; width: 100%; height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; border: 10px solid #222; box-sizing: border-box; }
        #game-world::after { content: "GAME ACTIVE - PRESS ESC TO PAUSE"; color: #00ff66; font-size: 20px; opacity: 0.3; }

        /* LOADING SCREEN */
        #loading-screen { position: absolute; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        #startBtn { padding: 20px 60px; background: #00ff66; color: #000; font-weight: bold; font-size: 24px; border: none; cursor: pointer; border-radius: 5px; box-shadow: 0 0 20px #00ff66; }

        /* PAUSE OVERLAY */
        #pause-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 5000; gap: 20px; }

        /* SIDEBAR */
        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .side-btn { background: #000; color: #00ff66; border: 2px solid #00ff66; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; text-align: left; width: 180px; }
        .side-btn:hover { background: #00ff66; color: #000; box-shadow: 0 0 15px #00ff66; }

        /* SEPARATE BOXES */
        .box { border: 2px solid #00ff66; background: #000; height: 500px; display: flex; flex-direction: column; }
        .box-header { background: #00ff66; color: #000; padding: 8px 12px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; }
        .box-body { padding: 15px; overflow-y: auto; color: #00ff66; flex-grow: 1; }

        /* JUKEBOX SPECIFICS */
        .jukebox-box { width: 450px; }
        .track-item { border: 1px solid #00ff66; padding: 10px; margin-bottom: 10px; cursor: pointer; border-left: 5px solid #00ff66; background: #050505; }
        .track-item:hover { background: #0a0a0a; border-color: #fff; }

        /* TERMINAL SPECIFICS */
        .terminal-box { width: 350px; display: none; }
        #term-log { font-size: 12px; line-height: 1.4; }
        #term-input { background: transparent; border: none; border-top: 1px solid #004411; color: #00ff66; width: 100%; padding: 10px 0; outline: none; font-family: inherit; }

        /* CREDITS SPECIFICS */
        .credits-box { width: 250px; display: none; }

        /* ORANGE MEDIA CONTROLS */
        .media-bar { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 15px; border-top: 1px solid #00ff66; }
        .orange-btn { background: #cc7700; color: #fff; border: none; border-radius: 5px; width: 40px; height: 40px; font-size: 18px; cursor: pointer; box-shadow: 0 0 10px #ff8800; display: flex; justify-content: center; align-items: center; }
        .orange-btn.large { width: 60px; height: 60px; font-size: 28px; }

        /* TIKTOK FARLANDS EVENT */
        #farlands-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('TIKTOKFARLANDS.png') center/cover no-repeat; display: none; z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        #farlands-video { width: 420px; height: 720px; background: #000; border: 4px solid #ff8800; box-shadow: 0 0 40px #ff8800; object-fit: cover; }
        #esc-msg { position: absolute; bottom: 30px; color: red; font-weight: bold; font-size: 20px; display: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <button id="startBtn" onclick="initGame()">PLAY GAME</button>
    </div>

    <div id="game-world"></div>

    <div id="pause-overlay">
        <div class="sidebar">
            <button class="side-btn" onclick="togglePause()">CONTINUE</button>
            <button class="side-btn" onclick="toggleTerminal()">TERMINAL</button>
            <button class="side-btn" onclick="toggleCredits()">CREDITS</button>
            <button class="side-btn" onclick="location.reload()">RESTART</button>
        </div>

        <div class="box jukebox-box">
            <div class="box-header"><span>SYSTEM_JUKEBOX</span><span>© 2026 IZAYYAH_DEV</span></div>
            <div class="box-body">
                <div class="track-item" onclick="playMusic('BikeRides.mp3')">Bike Rides</div>
                <div class="track-item" onclick="playMusic('Paris.mp3')">Jazz Paris</div>
                <div class="track-item" onclick="playMusic('Chicken.mp3')">If I Had A Chicken</div>
            </div>
            <div class="media-bar">
                <button class="orange-btn">🔀</button>
                <button class="orange-btn large" onclick="toggleMusic()">⏸</button>
                <button class="orange-btn">🔁</button>
            </div>
        </div>

        <div class="box terminal-box" id="terminal-ui">
            <div class="box-header"><span>EXTERNAL_TERMINAL</span></div>
            <div class="box-body">
                <div id="term-log">> SYSTEM READY...</div>
                <input type="text" id="term-input" placeholder="Type 'tiktok'..." autocomplete="off">
            </div>
        </div>

        <div class="box credits-box" id="credits-ui">
            <div class="box-header"><span>CREDITS</span></div>
            <div class="box-body">
                <p><strong>DEVELOPER:</strong></p>
                <p>TikTok: @izayyah_dev</p>
                <br>
                <p><strong>AUDIO:</strong></p>
                <p>YouTube Audio Library</p>
            </div>
        </div>
    </div>

    <div id="farlands-overlay">
        <video id="farlands-video" loop></video>
        <div class="media-bar">
            <button class="orange-btn large" onclick="toggleFarlandsVideo()">⏸</button>
        </div>
        <div id="esc-msg">YOU CAN'T ESCAPE THE FARLANDS</div>
    </div>

<script>
    const audioPlayer = new Audio();
    const farlandsVid = document.getElementById('farlands-video');
    const tiktokPlaylist = ['speed.mp4', 'man.mp4', 'hero.mp4', 'tiktok.mp4', 'bart.mp4', 'Kid.mp4', 'bear.mp4'];
    let isPaused = false;
    let farlandsActive = false;

    function initGame() {
        document.getElementById('loading-screen').style.display = 'none';
    }

    function togglePause() {
        if (farlandsActive) return;
        isPaused = !isPaused;
        document.getElementById('pause-overlay').style.display = isPaused ? 'flex' : 'none';
    }

    // Toggle Separate Windows
    function toggleTerminal() {
        const t = document.getElementById('terminal-ui');
        t.style.display = (t.style.display === 'flex') ? 'none' : 'flex';
    }

    function toggleCredits() {
        const c = document.getElementById('credits-ui');
        c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
    }

    // Music Logic
    function playMusic(src) {
        audioPlayer.src = src;
        audioPlayer.play();
    }

    function toggleMusic() {
        if (audioPlayer.paused) audioPlayer.play();
        else audioPlayer.pause();
    }

    // Terminal Command
    document.getElementById('term-input').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            const cmd = this.value.toLowerCase().trim();
            if (cmd === 'tiktok') {
                startFarlands();
            }
            this.value = '';
        }
    });

    // TikTok Farlands Event
    function startFarlands() {
        farlandsActive = true;
        audioPlayer.pause();
        document.getElementById('pause-overlay').style.display = 'none';
        document.getElementById('farlands-overlay').style.display = 'flex';
        playFarlandsRandom();
    }

    function playFarlandsRandom() {
        // speed.mp4 first, then random
        const vid = tiktokPlaylist[Math.floor(Math.random() * tiktokPlaylist.length)];
        farlandsVid.src = vid;
        farlandsVid.play();
    }

    function toggleFarlandsVideo() {
        if (farlandsVid.paused) farlandsVid.play();
        else farlandsVid.pause();
    }

    // Scrolling logic
    window.addEventListener('keydown', (e) => {
        if (farlandsActive) {
            if (e.key === 'Escape') {
                const msg = document.getElementById('esc-msg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 2000);
            }
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                playFarlandsRandom();
            }
        } else {
            if (e.key === 'Escape') togglePause();
        }
    });
</script>
</body>
</html>
