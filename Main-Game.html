<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>drive deodorant</title>
    <link rel="icon" type="image/png" href="Jamper.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; }
        canvas { display: none; background: #000; } 
        
        #error-screen { 
            position: absolute; width: 100%; height: 100%; background: #000; 
            color: #ff4444; display: none; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center; 
            padding: 40px; z-index: 10000; border: 10px solid #ff4444; box-sizing: border-box;
        }

        #loading-screen { 
            position: absolute; width: 100%; height: 100%; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            background: #000 url('Jamper.png') no-repeat center; 
            background-size: contain; z-index: 500; 
        }
        #startBtn { 
            margin-top: 20px; padding: 25px 80px; background: #00ff66; color: #000; 
            border: none; font-weight: bold; cursor: pointer; border-radius: 8px; 
            font-size: 32px; text-transform: uppercase; box-shadow: 0 0 30px #00ff66; 
        }
        
        /* PAUSE MENU */
        #pause-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0, 5, 0, 0.98); display: none; justify-content: center; align-items: center; z-index: 1000; gap: 20px; }
        .menu-sidebar { display: flex; flex-direction: column; gap: 10px; width: 200px; }
        .menu-btn { background: #111; border: 2px solid #00ff66; color: #00ff66; padding: 12px; font-size: 14px; font-weight: bold; text-align: left; cursor: pointer; text-transform: uppercase; }
        .menu-btn:hover { background: #00ff66; color: #000; }
        
        .content-panel { width: 550px; height: 450px; border: 2px solid #00ff66; background: #000; display: flex; flex-direction: column; position: relative; }
        .panel-header { background: #00ff66; color: #000; padding: 8px; font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; }
        
        .jukebox { padding: 15px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; height: 260px; }
        .track-item { background: #111; border: 1px solid #004422; padding: 10px; cursor: pointer; }
        .track-item:hover { border-color: #00ff66; }
        .track-title { color: #00ff66; font-weight: bold; font-size: 16px; }
        .track-sub { color: #008844; font-size: 10px; text-transform: uppercase; }
        
        .media-controls { margin-top: auto; display: flex; gap: 10px; padding: 15px; border-top: 1px solid #00ff66; }
        .control-btn { flex: 1; padding: 8px; background: #002211; border: 1px solid #00ff66; color: #00ff66; font-size: 11px; cursor: pointer; }

        /* COUNTDOWN */
        #countdown-text { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #00ff66; font-size: 120px; font-weight: bold; display: none; z-index: 2000; text-shadow: 0 0 20px #00ff66; }

        #retryBtn { display:none; position:absolute; top:60%; left:50%; transform:translate(-50%,-50%); padding:20px 40px; background:#00ff66; font-weight:bold; cursor:pointer; z-index: 600; border:none; color: #000; font-size: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="error-screen">
        <h1 style="font-size: 50px;">⚠️ FILE ERROR ⚠️</h1>
        <p id="error-msg"></p>
    </div>

    <div id="loading-screen">
        <button id="startBtn">PLAY GAME</button>
    </div>

    <div id="countdown-text">3</div>

    <div id="pause-overlay">
        <div class="menu-sidebar">
            <button class="menu-btn" onclick="togglePause()">Continue</button>
            <button class="menu-btn" onclick="location.reload()">Restart</button>
            <button class="menu-btn" onclick="document.getElementById('file-input').click()">Import MP3</button>
            <input type="file" id="file-input" accept="audio/*" style="display:none">
        </div>
        
        <div class="content-panel">
            <div class="panel-header">
                <span>SYSTEM_JUKEBOX</span>
                <span id="copy-tag" onclick="showInspo()" style="cursor:pointer">© 2026 IZAYYAH_DEV</span>
            </div>
            
            <div class="jukebox">
                <div class="track-item" onclick="playTrack('BikeRides.mp3')">
                    <div class="track-title">Bike Rides</div>
                    <div class="track-sub">YouTube Library</div>
                </div>
                <div class="track-item" onclick="playTrack('Paris.mp3')">
                    <div class="track-title">Jazz Paris</div>
                    <div class="track-sub">YouTube Library</div>
                </div>
                <div class="track-item" onclick="playTrack('Chicken.mp3')">
                    <div class="track-title">If I Had A Chicken</div>
                    <div class="track-sub">YouTube Library</div>
                </div>
            </div>

            <div class="media-controls">
                <button class="control-btn" id="repeatBtn" onclick="toggleRepeat()">REPEAT: OFF</button>
                <button class="control-btn" id="pauseMusicBtn" onclick="toggleMusicPause()">PAUSE MUSIC</button>
            </div>
        </div>
    </div>

    <button id="retryBtn" onclick="resetGame()">RETRY?</button>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const countdownEl = document.getElementById('countdown-text');
const bgMusic = new Audio();
bgMusic.loop = false; 

let isRepeating = false, musicIsPaused = false;
let speed = 8, score = 0, gameOver = false, paused = false, inCountdown = false;
let projectiles = [], playerProjectiles = [], player = { x: 0, y: 0, w: 75, h: 75, dy: 0, jumps: 0, rotation: 0 };
let bgScroll = 0, spawnTimer = 0, hasFatalError = false, lermaShake = 0;

// MUSIC UNPAUSEABLE PROTECTION
bgMusic.onpause = () => { if(!musicIsPaused) bgMusic.play().catch(()=>{}); };
bgMusic.onended = () => {
    if(isRepeating) bgMusic.play();
    else playTrack(['BikeRides.mp3', 'Paris.mp3', 'Chicken.mp3'][Math.floor(Math.random()*3)]);
};

function playTrack(src) {
    musicIsPaused = false;
    bgMusic.src = src;
    bgMusic.play();
    document.getElementById('pauseMusicBtn').innerText = "PAUSE MUSIC";
}

function toggleRepeat() {
    isRepeating = !isRepeating;
    document.getElementById('repeatBtn').innerText = `REPEAT: ${isRepeating ? 'ON' : 'OFF'}`;
}

function toggleMusicPause() {
    musicIsPaused = !musicIsPaused;
    musicIsPaused ? bgMusic.pause() : bgMusic.play();
    document.getElementById('pauseMusicBtn').innerText = musicIsPaused ? "RESUME MUSIC" : "PAUSE MUSIC";
}

document.getElementById('file-input').onchange = (e) => {
    const file = e.target.files[0];
    if(file) playTrack(URL.createObjectURL(file));
};

function showInspo() { document.getElementById('copy-tag').innerText = "MADE BY IZAYAH | INSPO BY ALEXANDER LERMA"; }

const images = {};
const sources = { player: 'Jamper.png', enemy: 'Lerma.png', dove: 'dove.png', bottle: 'bottle.png', wata: 'wata.png', bg: 'Brixk.png' };
for (let key in sources) {
    images[key] = new Image();
    images[key].onerror = () => { hasFatalError = true; document.getElementById('error-screen').style.display = 'flex'; document.getElementById('error-msg').innerText = `Missing: ${sources[key]}`; };
    images[key].src = sources[key];
}

window.addEventListener('keydown', e => {
    if (e.code === 'Escape') togglePause();
    if (gameOver || paused || inCountdown || hasFatalError) return;
    if (['Space','ArrowUp','KeyW'].includes(e.code) && player.jumps < 2) { player.dy = -16; player.jumps++; }
    if (['KeyS','ArrowDown'].includes(e.code)) playerProjectiles.push({ x: player.x, y: player.y + 25, vx: -16 });
});

function togglePause() {
    if (gameOver || hasFatalError || inCountdown) return;
    if (!paused) {
        paused = true;
        document.getElementById('pause-overlay').style.display = 'flex';
    } else {
        document.getElementById('pause-overlay').style.display = 'none';
        startCountdown();
    }
}

function startCountdown() {
    paused = true; // Stay technically paused for logic
    inCountdown = true;
    countdownEl.style.display = 'block';
    let count = 3;
    countdownEl.innerText = count;
    
    let timer = setInterval(() => {
        count--;
        if (count <= 0) {
            clearInterval(timer);
            countdownEl.style.display = 'none';
            paused = false;
            inCountdown = false;
            update();
        } else {
            countdownEl.innerText = count;
        }
    }, 1000);
}

document.getElementById('startBtn').onclick = () => {
    document.getElementById('loading-screen').style.display = 'none';
    canvas.style.display = 'block';
    playTrack(['BikeRides.mp3', 'Paris.mp3', 'Chicken.mp3'][Math.floor(Math.random()*3)]);
    resize(); resetGame();
};

window.addEventListener('resize', resize);
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function resetGame() {
    score = 0; gameOver = false; projectiles = []; playerProjectiles = [];
    player.x = canvas.width - 160; player.y = canvas.height - 180; player.dy = 0;
    document.getElementById('retryBtn').style.display = 'none';
    update();
}

function update() {
    if (gameOver || paused || hasFatalError) return;
    const groundY = canvas.height - 100;
    player.dy += 0.85; player.y += player.dy;
    if (player.y < groundY - player.h) { player.rotation += 0.15; } 
    else { player.y = groundY - player.h; player.dy = 0; player.jumps = 0; player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2); }
    bgScroll -= speed; spawnTimer++;
    if (spawnTimer > 60) { projectiles.push({ x: -50, y: groundY - 55, vx: speed + 4 }); spawnTimer = 0; }
    
    projectiles.forEach(p => {
        p.x += p.vx;
        if (p.x < player.x + player.w - 20 && p.x + 40 > player.x + 20 && p.y < player.y + player.h && p.y + 40 > player.y) {
            gameOver = true; document.getElementById('retryBtn').style.display = 'block';
        }
    });
    playerProjectiles.forEach((dp, j) => {
        dp.x += dp.vx;
        if (dp.x < 150 && dp.x > 30 && dp.y > groundY - 120) { score += 500; playerProjectiles.splice(j, 1); lermaShake = 15; }
    });
    if (lermaShake > 0) lermaShake--;
    score += 1; draw(); requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const bgW = images.bg.width || 100;
    const shiftX = bgScroll % bgW;
    for (let x = shiftX - bgW; x < canvas.width + bgW; x += bgW) ctx.drawImage(images.bg, x, 0, bgW, canvas.height);
    const groundY = canvas.height - 100;
    let lx = 30, ly = groundY - 130;
    if (lermaShake > 0) { lx += (Math.random()-0.5)*15; ly += (Math.random()-0.5)*15; }
    ctx.drawImage(images.enemy, lx, ly, 130, 130);
    ctx.drawImage(images.bottle, lx + 130, groundY - 70, 50, 50);
    playerProjectiles.forEach(dp => ctx.drawImage(images.dove, dp.x, dp.y, 40, 40));
    
    // WATER WITH NEON CYAN SHADOWS
    projectiles.forEach(p => {
        ctx.save(); 
        ctx.shadowBlur = 20; 
        ctx.shadowColor = "cyan"; 
        ctx.drawImage(images.wata, p.x, p.y, 55, 55); 
        ctx.restore();
    });

    ctx.save(); ctx.translate(player.x + player.w/2, player.y + player.h/2); ctx.rotate(player.rotation);
    ctx.drawImage(images.player, -player.w/2, -player.h/2, player.w, player.h); ctx.restore();
    ctx.font = "bold 28px Courier New"; ctx.fillStyle = "#00ff66"; ctx.fillText(`SCORE: ${score}`, 20, 40); 
}
</script>
</body>
</html>
